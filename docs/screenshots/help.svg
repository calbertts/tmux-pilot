<svg xmlns="http://www.w3.org/2000/svg" width="620" height="532">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .term { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
      .bold { font-weight: 700; }
    </style>
  </defs>
  <!-- Window frame -->
  <rect width="620" height="532" rx="10" fill="#282828" />
  <!-- Title bar -->
  <rect width="620" height="38" rx="10" fill="#1d2021" />
  <rect x="0" y="28" width="620" height="10" fill="#1d2021" />
  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <!-- Title text -->
  <text x="310" y="23" text-anchor="middle" fill="#928374" class="term" font-size="12">pilot help-all</text>
  <!-- Content -->
  <g transform="translate(16, 50)">
    <text x="0.0" y="13" fill="#fabd2f" class="term bold">  tmux-pilot</text>
    <text x="93.6" y="13" fill="#ebdbb2" class="term"> — tmux session manager for AI coding agents</text>
    <text x="0.0" y="53" fill="#ebdbb2" class="term bold">  ━━━ CLI Commands ━━━</text>
    <text x="0.0" y="73" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="73" fill="#b8bb26" class="term">pilot</text>
    <text x="70.2" y="73" fill="#ebdbb2" class="term">                     Feature selector (default)</text>
    <text x="0.0" y="93" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="93" fill="#b8bb26" class="term">pilot task</text>
    <text x="109.2" y="93" fill="#ebdbb2" class="term">                Task selector</text>
    <text x="0.0" y="113" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="113" fill="#b8bb26" class="term">pilot dash</text>
    <text x="109.2" y="113" fill="#ebdbb2" class="term">                Session dashboard</text>
    <text x="0.0" y="133" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="133" fill="#b8bb26" class="term">pilot free</text>
    <text x="109.2" y="133" fill="#ebdbb2" class="term"> &quot;Name&quot;         Create a free session</text>
    <text x="0.0" y="153" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="153" fill="#b8bb26" class="term">pilot restore</text>
    <text x="132.6" y="153" fill="#ebdbb2" class="term">             Restore copilot after restart</text>
    <text x="0.0" y="173" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="173" fill="#b8bb26" class="term">pilot scan</text>
    <text x="109.2" y="173" fill="#ebdbb2" class="term">                Detect running copilot sessions</text>
    <text x="0.0" y="193" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="193" fill="#b8bb26" class="term">pilot setup</text>
    <text x="117.0" y="193" fill="#ebdbb2" class="term">               Interactive setup wizard</text>
    <text x="0.0" y="233" fill="#ebdbb2" class="term bold">  ━━━ tmux Keybindings ━━━</text>
    <text x="0.0" y="253" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="253" fill="#fabd2f" class="term">prefix + F</text>
    <text x="109.2" y="253" fill="#ebdbb2" class="term">    Feature selector</text>
    <text x="0.0" y="273" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="273" fill="#fabd2f" class="term">prefix + T</text>
    <text x="109.2" y="273" fill="#ebdbb2" class="term">    Task selector</text>
    <text x="0.0" y="293" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="293" fill="#fabd2f" class="term">prefix + D</text>
    <text x="109.2" y="293" fill="#ebdbb2" class="term">    Session dashboard</text>
    <text x="0.0" y="313" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="313" fill="#fabd2f" class="term">prefix + N</text>
    <text x="109.2" y="313" fill="#ebdbb2" class="term">    Notification center</text>
    <text x="0.0" y="333" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="333" fill="#fabd2f" class="term">prefix + W</text>
    <text x="109.2" y="333" fill="#ebdbb2" class="term">    Watcher manager</text>
    <text x="0.0" y="373" fill="#ebdbb2" class="term bold">  ━━━ Notifications &amp; Watchers ━━━</text>
    <text x="0.0" y="393" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="393" fill="#b8bb26" class="term">pilot notify</text>
    <text x="124.8" y="393" fill="#ebdbb2" class="term"> &quot;title&quot;      Push a notification</text>
    <text x="0.0" y="413" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="413" fill="#b8bb26" class="term">pilot watch</text>
    <text x="117.0" y="413" fill="#ebdbb2" class="term"> pipeline      Watch a build pipeline</text>
    <text x="0.0" y="433" fill="#ebdbb2" class="term">    </text>
    <text x="31.2" y="433" fill="#b8bb26" class="term">pilot watchers</text>
    <text x="140.4" y="433" fill="#ebdbb2" class="term">            Manage active watchers</text>
  </g>
</svg>